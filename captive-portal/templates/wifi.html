<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WiFi - T.R.A.C.K.</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1><a href="/" style="color:inherit;text-decoration:none">&larr;</a> WiFi</h1>
        <p class="subtitle">Connect the Pi to a wireless network</p>

        <div id="alert" class="alert"></div>

        <div class="card">
            <div class="flex-between mb-1">
                <h2>Available Networks</h2>
                <button class="btn btn-sm btn-secondary" onclick="scan()">Scan</button>
            </div>
            <div id="scan-status" class="text-sm text-dim">Scanning...</div>
            <ul id="network-list" class="network-list"></ul>
        </div>

        <div id="connect-form" class="card hidden">
            <h2>Connect to <span id="selected-ssid"></span></h2>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password (leave blank for open)">
            </div>
            <button class="btn btn-primary" id="connect-btn" onclick="connect()">Connect</button>
        </div>

        <div class="card">
            <h2>Current Status</h2>
            <div id="wifi-status" class="text-sm text-dim">Checking...</div>
        </div>
    </div>

    <script>
    let selectedSsid = '';

    function showAlert(msg, type) {
        const el = document.getElementById('alert');
        el.textContent = msg;
        el.className = 'alert alert-' + type + ' show';
        setTimeout(() => el.classList.remove('show'), 5000);
    }

    function signalBars(strength) {
        const levels = [25, 50, 75, 100];
        return levels.map((t, i) =>
            '<span style="height:' + (4 + i * 4) + 'px" class="' + (strength >= t ? 'active' : '') + '"></span>'
        ).join('');
    }

    async function scan() {
        const list = document.getElementById('network-list');
        const status = document.getElementById('scan-status');
        list.innerHTML = '';
        status.textContent = 'Scanning...';
        status.classList.remove('hidden');

        try {
            const res = await fetch('/api/wifi/scan');
            const networks = await res.json();
            status.classList.add('hidden');

            if (!networks.length) {
                status.textContent = 'No networks found';
                status.classList.remove('hidden');
                return;
            }

            networks.forEach(n => {
                const li = document.createElement('li');
                li.className = 'network-item';
                li.innerHTML =
                    '<span class="network-ssid">' + esc(n.ssid) + '</span>' +
                    '<span class="network-meta">' +
                        '<span class="text-sm">' + esc(n.security) + '</span>' +
                        '<span class="signal-bar">' + signalBars(n.signal) + '</span>' +
                    '</span>';
                li.onclick = () => selectNetwork(n.ssid);
                list.appendChild(li);
            });
        } catch (e) {
            status.textContent = 'Scan failed: ' + e.message;
        }
    }

    function selectNetwork(ssid) {
        selectedSsid = ssid;
        document.getElementById('selected-ssid').textContent = ssid;
        document.getElementById('connect-form').classList.remove('hidden');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
    }

    async function connect() {
        const btn = document.getElementById('connect-btn');
        const password = document.getElementById('password').value;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Connecting...';

        try {
            const res = await fetch('/api/wifi/connect', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ssid: selectedSsid, password}),
            });
            const data = await res.json();
            if (data.ok) {
                showAlert(data.message, 'success');
                checkStatus();
            } else {
                showAlert(data.message || data.error, 'error');
            }
        } catch (e) {
            showAlert('Request failed: ' + e.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Connect';
        }
    }

    async function checkStatus() {
        const el = document.getElementById('wifi-status');
        try {
            const res = await fetch('/api/wifi/status');
            const s = await res.json();
            if (s.connected) {
                el.innerHTML = '<span class="badge badge-success">Connected</span> ' + esc(s.ssid);
            } else {
                el.innerHTML = '<span class="badge badge-warn">Disconnected</span>';
            }
        } catch {
            el.textContent = 'Unable to check status';
        }
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    scan();
    checkStatus();
    </script>
</body>
</html>
