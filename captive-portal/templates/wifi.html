<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WiFi - T.R.A.C.K.</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1><a href="/" style="color:inherit;text-decoration:none">&larr;</a> WiFi</h1>
        <p class="subtitle">Connect the Pi to a wireless network</p>

        <div id="alert" class="alert"></div>

        <div class="card">
            <h2>Connect to Network</h2>
            <div class="form-group">
                <label for="ssid">Network Name (SSID)</label>
                <input type="text" id="ssid" placeholder="Enter network name" autocomplete="off" autocapitalize="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password (leave blank for open)">
            </div>
            <button class="btn btn-primary" id="connect-btn" onclick="connect()">Connect</button>
        </div>

        <div class="card">
            <h2>Current Status</h2>
            <div id="wifi-status" class="text-sm text-dim">Checking...</div>
        </div>
    </div>

    <script>
    function showAlert(msg, type) {
        const el = document.getElementById('alert');
        el.textContent = msg;
        el.className = 'alert alert-' + type + ' show';
        setTimeout(() => el.classList.remove('show'), 5000);
    }

    const CLOUD_URL = 'https://track-web-frontend.fly.dev/';

    async function connect() {
        const btn = document.getElementById('connect-btn');
        const ssid = document.getElementById('ssid').value.trim();
        const password = document.getElementById('password').value;

        if (!ssid) {
            showAlert('Please enter a network name', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Connecting...';

        try {
            const res = await fetch('/api/wifi/connect', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ssid, password}),
            });
            const data = await res.json();
            if (data.ok) {
                showAlert('Connecting to ' + esc(ssid) + '... Redirecting to cloud app.', 'success');
                btn.innerHTML = '<span class="spinner"></span> Redirecting...';
                setTimeout(() => { window.location.href = CLOUD_URL; }, 3000);
                return;
            } else {
                showAlert(data.message || data.error, 'error');
            }
        } catch (e) {
            showAlert('Request failed: ' + e.message, 'error');
        }
        btn.disabled = false;
        btn.textContent = 'Connect';
    }

    async function checkStatus() {
        const el = document.getElementById('wifi-status');
        try {
            const res = await fetch('/api/wifi/status');
            const s = await res.json();
            if (s.connected) {
                el.innerHTML = '<span class="badge badge-success">Connected</span> ' + esc(s.ssid);
            } else {
                el.innerHTML = '<span class="badge badge-warn">Disconnected</span>';
            }
        } catch {
            el.textContent = 'Unable to check status';
        }
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // Allow Enter key to submit
    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') connect();
    });
    document.getElementById('ssid').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('password').focus();
    });

    checkStatus();
    </script>
</body>
</html>
